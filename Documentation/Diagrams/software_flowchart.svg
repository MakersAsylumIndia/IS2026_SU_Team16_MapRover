<svg xmlns="http://www.w3.org/2000/svg" width="680" height="590" viewBox="0 0 680 590" role="img">
  <title>MapRover Software Flowchart</title>
  <desc>Software flowchart showing two parallel processes. Left: Mapping pipeline on Raspberry Pi — boots Ubuntu and ROS2, launches mapping stack, YDLidar publishes scan data, EKF fusion corrects with IMU, slam_toolbox builds the map, RViz2 on laptop displays it. Right: Control pipeline on ESP32 — ESP32 creates WiFi hotspot, browser connects, user sends drive command, ESP32 drives L298N via GPIO, rover moves. A loop arrow shows the control flow repeating continuously.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text { font-family: sans-serif; }
    .title { font-size: 14px; font-weight: 500; }
    .sub   { font-size: 12px; }
    .sec   { font-size: 12px; fill: #888; }
    .lbl   { font-size: 11px; fill: #888; }
    .loop  { font-size: 11px; fill: #ba7517; font-style: italic; }
  </style>

  <!-- Section headers -->
  <text class="sec" x="160" y="30" text-anchor="middle">Mapping Pipeline (Raspberry Pi)</text>
  <text class="sec" x="510" y="30" text-anchor="middle">Control Pipeline (ESP32)</text>

  <!-- Center divider -->
  <line x1="340" y1="42" x2="340" y2="560" stroke="#ddd" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- ═══ LEFT COLUMN: Mapping pipeline (6 nodes, 86px steps) ═══ -->

  <!-- Node 1: Pi boots -->
  <rect x="83" y="46" width="154" height="56" rx="8" fill="#e8e7fd" stroke="#7f77dd" stroke-width="0.75"/>
  <text class="title" x="160" y="67" text-anchor="middle" fill="#3c3489">RPi + ROS2 boots</text>
  <text class="sub"   x="160" y="85" text-anchor="middle" fill="#534ab7">Ubuntu Server 22.04</text>

  <line x1="160" y1="102" x2="160" y2="132" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Node 2: Mapping stack launches -->
  <rect x="83" y="132" width="154" height="56" rx="8" fill="#e8e7fd" stroke="#7f77dd" stroke-width="0.75"/>
  <text class="title" x="160" y="153" text-anchor="middle" fill="#3c3489">Mapping stack up</text>
  <text class="sub"   x="160" y="171" text-anchor="middle" fill="#534ab7">All nodes launched</text>

  <line x1="160" y1="188" x2="160" y2="218" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Node 3: YDLidar scans -->
  <rect x="83" y="218" width="154" height="56" rx="8" fill="#d4f0e5" stroke="#1d9e75" stroke-width="0.75"/>
  <text class="title" x="160" y="239" text-anchor="middle" fill="#085041">YDLidar scans</text>
  <text class="sub"   x="160" y="257" text-anchor="middle" fill="#0f6e56">Publishes /scan</text>

  <line x1="160" y1="274" x2="160" y2="304" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Node 4: EKF fusion -->
  <rect x="83" y="304" width="154" height="56" rx="8" fill="#d4f0e5" stroke="#1d9e75" stroke-width="0.75"/>
  <text class="title" x="160" y="325" text-anchor="middle" fill="#085041">EKF fusion</text>
  <text class="sub"   x="160" y="343" text-anchor="middle" fill="#0f6e56">IMU → odom TF</text>

  <line x1="160" y1="360" x2="160" y2="390" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Node 5: SLAM builds map -->
  <rect x="83" y="390" width="154" height="56" rx="8" fill="#d4f0e5" stroke="#1d9e75" stroke-width="0.75"/>
  <text class="title" x="160" y="411" text-anchor="middle" fill="#085041">SLAM builds map</text>
  <text class="sub"   x="160" y="429" text-anchor="middle" fill="#0f6e56">Publishes /map</text>

  <line x1="160" y1="446" x2="160" y2="476" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Node 6: RViz2 displays -->
  <rect x="83" y="476" width="154" height="56" rx="8" fill="#deeefb" stroke="#378add" stroke-width="0.75"/>
  <text class="title" x="160" y="497" text-anchor="middle" fill="#0c447c">Map on RViz2</text>
  <text class="sub"   x="160" y="515" text-anchor="middle" fill="#185fa5">Laptop displays live</text>

  <!-- ═══ RIGHT COLUMN: Control pipeline (5 nodes) ═══ -->

  <!-- Node 1: ESP32 boots -->
  <rect x="433" y="46" width="154" height="56" rx="8" fill="#fde9b8" stroke="#ef9f27" stroke-width="0.75"/>
  <text class="title" x="510" y="67" text-anchor="middle" fill="#633806">ESP32 boots</text>
  <text class="sub"   x="510" y="85" text-anchor="middle" fill="#854f0b">WiFi AP created</text>

  <line x1="510" y1="102" x2="510" y2="132" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Node 2: Browser connects -->
  <rect x="433" y="132" width="154" height="56" rx="8" fill="#ebebdf" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="510" y="153" text-anchor="middle" fill="#2c2c2a">Browser connects</text>
  <text class="sub"   x="510" y="171" text-anchor="middle" fill="#5f5e5a">WebSocket opened</text>

  <line x1="510" y1="188" x2="510" y2="218" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Node 3: Drive command -->
  <rect x="433" y="218" width="154" height="56" rx="8" fill="#ebebdf" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="510" y="239" text-anchor="middle" fill="#2c2c2a">Drive command</text>
  <text class="sub"   x="510" y="257" text-anchor="middle" fill="#5f5e5a">F / B / L / R / S</text>

  <line x1="510" y1="274" x2="510" y2="304" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Node 4: GPIO → L298N -->
  <rect x="433" y="304" width="154" height="56" rx="8" fill="#f8ddd4" stroke="#d85a30" stroke-width="0.75"/>
  <text class="title" x="510" y="325" text-anchor="middle" fill="#712b13">GPIO → L298N</text>
  <text class="sub"   x="510" y="343" text-anchor="middle" fill="#993c1d">Direction signals</text>

  <line x1="510" y1="360" x2="510" y2="390" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Node 5: Rover moves -->
  <rect x="433" y="390" width="154" height="56" rx="8" fill="#ebebdf" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="510" y="411" text-anchor="middle" fill="#2c2c2a">Rover moves</text>
  <text class="sub"   x="510" y="429" text-anchor="middle" fill="#5f5e5a">LiDAR data updates</text>

  <!-- Loop arrow: Rover moves → Drive command (goes right side) -->
  <path d="M587,418 L622,418 L622,246 L587,246" fill="none" stroke="#ba7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text class="loop" x="625" y="336" dominant-baseline="central">loop</text>

  <!-- Continuous note under left column -->
  <text class="lbl" x="160" y="556" text-anchor="middle">Updates continuously while rover moves</text>

</svg>
