<svg xmlns="http://www.w3.org/2000/svg" width="680" height="510" viewBox="0 0 680 510" role="img">
  <title>MapRover System Architecture</title>
  <desc>Block diagram showing the two parallel systems of MapRover. Left: Sensing and Mapping chain — YDLidar X2 feeds laser data to Raspberry Pi 3 over USB; MPU-6050 IMU connects via I2C for rotation correction; Pi sends live map to Laptop via WiFi and ROS2. Right: Control and Movement chain — Browser or Xbox controller sends drive commands over WebSocket WiFi to ESP32; ESP32 drives two L298N motor driver modules via GPIO; L298N modules power six BO motors.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text { font-family: sans-serif; }
    .title { font-size: 14px; font-weight: 500; }
    .sub   { font-size: 12px; }
    .sec   { font-size: 12px; fill: #888; }
    .lbl   { font-size: 11px; fill: #888; }
  </style>

  <!-- Section headers -->
  <text class="sec" x="160" y="36" text-anchor="middle">Sensing &amp; Mapping</text>
  <text class="sec" x="510" y="36" text-anchor="middle">Control &amp; Movement</text>

  <!-- Center divider -->
  <line x1="340" y1="50" x2="340" y2="475" stroke="#ddd" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- ═══ LEFT COLUMN: Mapping chain ═══ -->

  <!-- YDLidar X2 -->
  <rect x="83" y="60" width="154" height="56" rx="8" fill="#d4f0e5" stroke="#1d9e75" stroke-width="0.75"/>
  <text class="title" x="160" y="81" text-anchor="middle" fill="#085041">YDLidar X2</text>
  <text class="sub"   x="160" y="99" text-anchor="middle" fill="#0f6e56">360° laser scan</text>

  <!-- Arrow: YDLidar → Pi -->
  <line x1="160" y1="116" x2="160" y2="175" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>
  <text class="lbl" x="165" y="150">USB</text>

  <!-- Raspberry Pi 3 -->
  <rect x="83" y="175" width="154" height="56" rx="8" fill="#e8e7fd" stroke="#7f77dd" stroke-width="0.75"/>
  <text class="title" x="160" y="196" text-anchor="middle" fill="#3c3489">Raspberry Pi 3</text>
  <text class="sub"   x="160" y="214" text-anchor="middle" fill="#534ab7">SLAM + mapping</text>

  <!-- MPU-6050 (to the right of Pi) -->
  <rect x="297" y="175" width="125" height="56" rx="8" fill="#d4f0e5" stroke="#1d9e75" stroke-width="0.75"/>
  <text class="title" x="359" y="196" text-anchor="middle" fill="#085041">MPU-6050</text>
  <text class="sub"   x="359" y="214" text-anchor="middle" fill="#0f6e56">IMU, gyroscope</text>

  <!-- Arrow: MPU-6050 → Pi (I2C) -->
  <line x1="297" y1="203" x2="237" y2="203" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>
  <text class="lbl" x="264" y="197" text-anchor="middle">I2C</text>

  <!-- Arrow: Pi → Laptop -->
  <line x1="160" y1="231" x2="160" y2="300" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>
  <text class="lbl" x="165" y="269">WiFi / ROS2</text>

  <!-- Laptop + RViz2 -->
  <rect x="83" y="300" width="154" height="56" rx="8" fill="#deeefb" stroke="#378add" stroke-width="0.75"/>
  <text class="title" x="160" y="321" text-anchor="middle" fill="#0c447c">Laptop + RViz2</text>
  <text class="sub"   x="160" y="339" text-anchor="middle" fill="#185fa5">Live map display</text>

  <!-- ═══ RIGHT COLUMN: Control chain ═══ -->

  <!-- Browser -->
  <rect x="433" y="60" width="154" height="56" rx="8" fill="#ebebdf" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="510" y="81" text-anchor="middle" fill="#2c2c2a">Browser</text>
  <text class="sub"   x="510" y="99" text-anchor="middle" fill="#5f5e5a">Remote control</text>

  <!-- Arrow: Browser → ESP32 -->
  <line x1="510" y1="116" x2="510" y2="175" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>
  <text class="lbl" x="515" y="150">WebSocket</text>

  <!-- ESP32 -->
  <rect x="433" y="175" width="154" height="56" rx="8" fill="#fde9b8" stroke="#ef9f27" stroke-width="0.75"/>
  <text class="title" x="510" y="196" text-anchor="middle" fill="#633806">ESP32</text>
  <text class="sub"   x="510" y="214" text-anchor="middle" fill="#854f0b">WebSocket control</text>

  <!-- Arrow: ESP32 → L298N -->
  <line x1="510" y1="231" x2="510" y2="290" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>
  <text class="lbl" x="515" y="264">GPIO</text>

  <!-- 1× L298N Motor Driver -->
  <rect x="433" y="290" width="154" height="56" rx="8" fill="#f8ddd4" stroke="#d85a30" stroke-width="0.75"/>
  <text class="title" x="510" y="311" text-anchor="middle" fill="#712b13">1× L298N</text>
  <text class="sub"   x="510" y="329" text-anchor="middle" fill="#993c1d">Motor driver</text>

  <!-- Arrow: L298N → Motors -->
  <line x1="510" y1="346" x2="510" y2="405" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 4× BO Motors -->
  <rect x="433" y="405" width="154" height="56" rx="8" fill="#ebebdf" stroke="#888780" stroke-width="0.75"/>
  <text class="title" x="510" y="426" text-anchor="middle" fill="#2c2c2a">4× BO Motors</text>
  <text class="sub"   x="510" y="444" text-anchor="middle" fill="#5f5e5a">Front &amp; rear</text>

  <!-- Power source notes -->
  <text class="lbl" x="160" y="484" text-anchor="middle">Powered by 10000mAh powerbank</text>
  <text class="lbl" x="510" y="484" text-anchor="middle">Powered by 11.1V Li-Ion battery</text>

</svg>
