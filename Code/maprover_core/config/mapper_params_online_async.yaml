slam_toolbox:
  ros__parameters:
    # Sensor settings
    use_sim_time: false
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    
    # Mapper settings
    mode: mapping
    debug_logging: false
    transform_timeout: 0.2
    
    # Map update parameters
    map_update_interval: 2.0
    resolution: 0.05
    provide_odom_frame: true   # ← slam_toolbox tracks position itself
    scan_queue_size: 10
    use_scan_matching: true
    minimum_time_interval: 0.5
    tf_buffer_duration: 30.0
    use_scan_barreling: false

